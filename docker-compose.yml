version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: sakila-db-compose
    volumes:
      - sakila-db-data:/var/lib/mysql
    networks:
      - sakila-network
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakila-app-compose
    ports:
      - "5000:5000"
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DB=${MYSQL_DATABASE}
    networks:
      - sakila-network
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure:5

  db-admin:
    image: adminer:latest
    container_name: sakila-adminer
    ports:
      - "8080:8080"
    networks:
      - sakila-network
    depends_on:
      - db

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakila-tests
    command: ["python", "-m", "pytest", "tests/", "-v"]
    profiles:
      - test
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DB=${MYSQL_DATABASE}
    networks:
      - sakila-network
    depends_on:
      db:
        condition: service_healthy

networks:
  sakila-network:
    driver: bridge

volumes:
  sakila-db-data: