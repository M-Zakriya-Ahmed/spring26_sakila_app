name: CI/CD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 . --max-line-length=120 --ignore=E501,W503

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_USER: root
      MYSQL_PASSWORD: admin
      MYSQL_DB: sakila
      SECRET_KEY: test-key
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Load Data
        run: |
          curl -O https://downloads.mysql.com/docs/sakila-db.tar.gz
          tar -xzvf sakila-db.tar.gz
          mysql -h 127.0.0.1 -uroot -padmin sakila < sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -uroot -padmin sakila < sakila-db/sakila-data.sql
      - name: Run tests
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Image
        run: |
          docker build -t sakila-app:${{ github.sha }} .
          docker images
      - name: Smoke Test
        run: |
          docker run -d -p 5000:5000 -e MYSQL_HOST=127.0.0.1 -e MYSQL_PASSWORD=admin -e SECRET_KEY=test --name smoke-test sakila-app:${{ github.sha }}
          sleep 5
          curl -f http://localhost:5000/ || exit 1

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build for Scan
        run: docker build -t sakila-app:${{ github.sha }} .
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sakila-app:${{ github.sha }}'
          format: 'table'
          exit-code: 0
          output: 'trivy-report.txt'
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.txt